<div class="card mb-0 sm-profile-card" id="user-information-card">
    <form hx-post="{% url 'user_edit' user_obj.pk %}" hx-encoding="multipart/form-data"
          hx-target="#user-information-card" hx-swap="outerHTML" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="card-header d-flex align-items-center justify-content-between gap-2">
            <h6 class="card-title mb-0">Informações da Pessoa</h6>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-sm btn-outline-secondary"
                        hx-get="{% url 'user_detail' user_obj.pk %}?component=information"
                        hx-target="#user-information-card" hx-swap="outerHTML">Cancelar</button>
                <button type="submit" class="btn btn-sm btn-primary"><i class="feather-check me-1"></i> Salvar</button>
            </div>
        </div>
        <div class="card-body sm-profile-card-body">
            <div class="sm-profile-hero d-flex flex-column flex-sm-row align-items-center text-center text-sm-start gap-3 pb-4 mb-4 border-bottom">
                <div class="sm-profile-avatar-picker flex-shrink-0">
                    <label for="{{ form.avatar.id_for_label }}" class="sm-profile-avatar-edit mb-0">
                        {% if user_obj.avatar %}<img src="{{ user_obj.avatar.url }}" class="sm-profile-avatar" alt="Foto de {{ user_obj.get_full_name }}">{% else %}<div class="avatar-text avatar-xl bg-soft-primary text-primary">{{ user_obj.get_short_name|first|upper }}</div>{% endif %}
                    </label>
                    {{ form.avatar }}
                    {% for error in form.avatar.errors %}<div class="invalid-feedback d-block text-center mt-2">{{ error }}</div>{% endfor %}
                </div>
                <div class="min-w-0"><h5 class="mb-1">{{ user_obj.get_full_name }}</h5><p class="text-muted mb-0 text-break">{{ user_obj.email }}</p></div>
            </div>
            {% include "partials/person_form_fields.html" with form=form exclude_field="avatar" %}
        </div>
    </form>
</div>
