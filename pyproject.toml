[tool.black]
line-length = 100
target-version = ["py313"]
include = '\.pyi?$'
exclude = '''
/(
    migrations
  | \.git
  | \.venv
  | build
)/
'''

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "T20", "DJ"]
ignore = [
    "DJ001",   # Avoid using null=True on string-based fields — we handle it explicitly
    "A003",    # Class attribute shadowing builtin (id, type etc.)
    "DJ012",   # Mis-fires on the `all_objects = models.Manager()` next to a custom default manager;
               # reordering would change Django's default-manager semantics.
]
exclude = ["migrations", ".git", ".venv", "build"]

[tool.ruff.lint.per-file-ignores]
"*/tests/*" = ["N802", "S101", "ANN"]
"*/conftest.py" = ["N802", "ANN"]
"*/migrations/*" = ["ALL"]
"scripts/*" = ["T20", "E402", "E501"]

[tool.coverage.run]
source = ["base", "core", "accounts", "locations", "audit", "teachers", "students", "guardians", "classes", "rooms", "agenda", "activities", "academic_calendar", "attendance", "enrollments", "notifications", "dashboard", "addresses"]
omit = ["*/migrations/*", "*/tests/*", "*/conftest.py", "manage.py"]

[tool.coverage.report]
skip_empty = true
fail_under = 80
