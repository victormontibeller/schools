[pytest]
DJANGO_SETTINGS_MODULE = core.settings
pythonpath = .
testpaths = base core accounts audit teachers students guardians classes rooms agenda activities academic_calendar attendance notifications dashboard
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -m "not tenant"
markers =
    tenant: requer PostgreSQL + django_tenants (perfil DJANGO_ENV=test_pg)