<div class="card mb-0 sm-profile-card" id="{{ component_id }}">
    <form hx-post="{{ edit_url }}" hx-encoding="multipart/form-data"
          hx-target="#{{ component_id }}" hx-swap="outerHTML" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="card-header d-flex align-items-center justify-content-between gap-2">
            <h6 class="card-title mb-0">{{ component_title }}</h6>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-sm btn-outline-secondary" hx-get="{{ cancel_url }}" hx-target="#{{ component_id }}" hx-swap="outerHTML">Cancelar</button>
                <button type="submit" class="btn btn-sm btn-primary"><i class="feather-check me-1"></i> Salvar</button>
            </div>
        </div>
        <div class="card-body sm-profile-card-body">
            {% include "partials/organization_form_fields.html" with organization=organization %}
        </div>
    </form>
</div>
