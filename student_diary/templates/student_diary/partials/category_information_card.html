<div class="card mb-0 sm-detail-card" id="diary-category-information-card">
    <div class="card-header d-flex align-items-center justify-content-between gap-2"><h6 class="card-title mb-0">Informações do aspecto</h6><button type="button" class="btn btn-sm btn-outline-primary" hx-get="{% url 'diary_aspect_toggle' category.pk %}" hx-target="#diary-category-information-card" hx-swap="outerHTML"><i class="feather-edit-2 me-1"></i> Alterar disponibilidade</button></div>
    <div class="card-body">{% if saved %}<div class="alert alert-success py-2">Aspecto atualizado com sucesso.</div>{% endif %}<dl class="row mb-0 sm-detail-definition"><dt class="col-sm-4">Aspecto</dt><dd class="col-sm-8">{{ category.name }}</dd><dt class="col-sm-4">Disponibilidade</dt><dd class="col-sm-8">{% if category.is_enabled %}Ativo na rotina{% else %}Inativo{% endif %}</dd><dt class="col-sm-4">Ordem</dt><dd class="col-sm-8">{{ category.display_order }}</dd></dl></div>
</div>
