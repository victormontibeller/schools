name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  quality:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff (linting)
        run: ruff check base core accounts audit teachers students guardians classes rooms agenda activities academic_calendar attendance notifications dashboard scripts

      - name: Run black (format check)
        run: black --check base core accounts audit teachers students guardians classes rooms agenda activities academic_calendar attendance notifications dashboard scripts

  test:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest (SQLite) with coverage
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=80
        env:
          DJANGO_SETTINGS_MODULE: core.settings

  test-tenant:
    name: Tests (PostgreSQL + django_tenants)
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schools_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tenant isolation tests
        run: DJANGO_ENV=test_pg pytest -m tenant -v
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_TEST_NAME: schools_test_db
