name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  quality:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install --require-hashes -r requirements-dev.lock

      - name: Run ruff (linting)
        run: ruff check .

      - name: Run black (format check)
        run: black --check .

      - name: Audit Python dependencies
        run: pip-audit -r requirements.lock

      - name: Verify dependency locks
        run: |
          pip-compile --dry-run --generate-hashes --output-file=requirements.lock requirements.txt
          pip-compile --dry-run --allow-unsafe --generate-hashes --output-file=requirements-dev.lock requirements-dev.txt

      - name: Check import contracts
        run: python scripts/check_import_contracts.py

      - name: Check canonical UI contracts
        run: python scripts/check_ui_contracts.py

  test:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install --require-hashes -r requirements-dev.lock

      - name: Run pytest (SQLite) with coverage
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=85
        env:
          DJANGO_SETTINGS_MODULE: core.settings

      - name: Enforce critical-flow coverage
        run: >-
          coverage report
          --include='accounts/*,tenancy/*,core/permissions.py,audit/*,financeiro/*'
          --fail-under=90
          --skip-empty

  test-tenant:
    name: Tests (PostgreSQL + django_tenants)
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:15@sha256:bcab099bfaab33333a73a2ebe8c1d615c9f4c2402dd43452f989a36c6da9a5ba
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schools_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install --require-hashes -r requirements-dev.lock

      - name: Run tenant isolation tests
        run: DJANGO_ENV=test_pg pytest -m tenant -v
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_TEST_NAME: schools_test_db

  test-ui:
    name: UI geometry (Chromium)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install --require-hashes -r requirements-dev.lock

      - name: Install Chromium
        run: playwright install --with-deps chromium

      - name: Run deterministic UI tests
        run: >-
          pytest -m ui --browser chromium
          --tracing=retain-on-failure
          --screenshot=only-on-failure
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          DJANGO_ALLOW_ASYNC_UNSAFE: "true"
          DJANGO_UI_TEST_DB: /tmp/school-manager-playwright.sqlite3

      - name: Preserve Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-diagnostics
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2

  trivy:
    name: Dependency and IaC scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Build application image
        run: docker build --tag schools:ci .

      - name: Scan application image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: schools:ci
          scan-type: image
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
