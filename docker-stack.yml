version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: schools_db
      POSTGRES_USER: schools
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets: [db_password]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schools -d schools_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: ["/bin/sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$(cat /run/secrets/redis_password)\""]
    secrets: [redis_password]
    volumes: ["redisdata:/data"]
    networks: [backend]
    deploy:
      restart_policy:
        condition: on-failure

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: schools
      RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq_password
    secrets: [rabbitmq_password]
    volumes: ["rabbitdata:/var/lib/rabbitmq"]
    networks: [backend]
    deploy:
      restart_policy:
        condition: on-failure

  app:
    image: ${SCHOOLS_IMAGE:-schools:latest}
    environment: &app_environment
      DJANGO_ENV: production
      DEBUG: "False"
      ALLOWED_HOSTS: ${APP_DOMAIN},${DEMO_DOMAIN}
      DB_NAME: schools_db
      DB_USER: schools
      DB_HOST: postgres
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      SECRET_KEY_FILE: /run/secrets/django_secret_key
      DB_PASSWORD_FILE: /run/secrets/db_password
      METRICS_TOKEN_FILE: /run/secrets/metrics_token
      READINESS_TOKEN_FILE: /run/secrets/readiness_token
      OTEL_SERVICE_NAME: schools-web
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      TRUSTED_PROXY_IPS: ${TRAEFIK_PROXY_IP:-10.0.0.2}
    secrets: [django_secret_key, db_password, redis_password, rabbitmq_password, metrics_token, readiness_token]
    networks: [backend, proxy]
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.schools.rule=Host(`${APP_DOMAIN}`) || Host(`${DEMO_DOMAIN}`)
        - traefik.http.routers.schools.entrypoints=websecure
        - traefik.http.routers.schools.tls=true
        - traefik.http.routers.schools.tls.certresolver=le
        - traefik.http.routers.schools.middlewares=security-headers@file
        - traefik.http.services.schools.loadbalancer.server.port=8000

  worker:
    image: ${SCHOOLS_IMAGE:-schools:latest}
    command: ["opentelemetry-instrument", "celery", "-A", "core.celery", "worker", "--loglevel=info"]
    environment:
      <<: *app_environment
      OTEL_SERVICE_NAME: schools-worker
    secrets: [django_secret_key, db_password, redis_password, rabbitmq_password, metrics_token, readiness_token]
    networks: [backend]
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  beat:
    image: ${SCHOOLS_IMAGE:-schools:latest}
    command: ["celery", "-A", "core.celery", "beat", "--loglevel=info"]
    environment:
      <<: *app_environment
      OTEL_SERVICE_NAME: schools-beat
    secrets: [django_secret_key, db_password, redis_password, rabbitmq_password, metrics_token, readiness_token]
    networks: [backend]
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  traefik:
    image: traefik:v3.1
    command:
      - --providers.swarm=true
      - --providers.swarm.exposedbydefault=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      - --log.format=json
      - --accesslog.format=json
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - acme:/acme
    networks: [proxy]
    deploy:
      placement:
        constraints: [node.role == manager]

  prometheus:
    image: prom/prometheus:v2.54.1
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
      - source: prometheus_alerts
        target: /etc/prometheus/alerts.yml
    secrets: [metrics_token]
    volumes: ["prometheus_data:/prometheus"]
    networks: [backend]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    configs:
      - source: otel_config
        target: /etc/otelcol-contrib/config.yml
    networks: [backend]

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
    secrets: [grafana_admin_password]
    volumes: ["grafana_data:/var/lib/grafana"]
    networks: [backend]

configs:
  prometheus_config:
    file: ./docker/prometheus/prometheus.yml
  prometheus_alerts:
    file: ./docker/prometheus/alerts.yml
  otel_config:
    file: ./docker/otel-collector.yml

secrets:
  django_secret_key: {external: true}
  db_password: {external: true}
  redis_password: {external: true}
  rabbitmq_password: {external: true}
  metrics_token: {external: true}
  readiness_token: {external: true}
  grafana_admin_password: {external: true}

volumes:
  pgdata:
  redisdata:
  rabbitdata:
  acme:
  prometheus_data:
  grafana_data:

networks:
  backend:
    driver: overlay
    attachable: false
    driver_opts:
      encrypted: "true"
  proxy:
    driver: overlay
    attachable: false
