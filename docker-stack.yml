version: "3.9"

services:
  postgres:
    image: postgres:15@sha256:bcab099bfaab33333a73a2ebe8c1d615c9f4c2402dd43452f989a36c6da9a5ba
    environment:
      POSTGRES_DB: schools_db
      POSTGRES_USER: schools
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets: [db_password]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schools -d schools_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command: ["/bin/sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$(cat /run/secrets/redis_password)\""]
    secrets: [redis_password]
    volumes: ["redisdata:/data"]
    networks: [backend]
    deploy:
      restart_policy:
        condition: on-failure

  rabbitmq:
    image: rabbitmq:3-management-alpine@sha256:606d8c0d6b3c18d1da9afc53bc7cdb2a8d5486df91b5a9830e9e07626c9ae281
    environment:
      RABBITMQ_DEFAULT_USER: schools
      RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq_password
    secrets: [rabbitmq_password]
    volumes: ["rabbitdata:/var/lib/rabbitmq"]
    networks: [backend]
    deploy:
      restart_policy:
        condition: on-failure

  app:
    image: ${SCHOOLS_IMAGE:?SCHOOLS_IMAGE deve conter uma imagem fixada por digest}
    environment: &app_environment
      DJANGO_ENV: production
      DEBUG: "False"
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN}
      TENANT_BASE_DOMAIN: ${TENANT_BASE_DOMAIN}
      ALLOWED_HOSTS: ${PLATFORM_DOMAIN},.${TENANT_BASE_DOMAIN}
      DB_NAME: schools_db
      DB_USER: schools
      DB_HOST: postgres
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      RABBITMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
      SECRET_KEY_FILE: /run/secrets/django_secret_key
      DB_PASSWORD_FILE: /run/secrets/db_password
      METRICS_TOKEN_FILE: /run/secrets/metrics_token
      READINESS_TOKEN_FILE: /run/secrets/readiness_token
      OTEL_SERVICE_NAME: schools-web
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      TRUSTED_PROXY_IPS: ${TRAEFIK_PROXY_IP:-10.0.0.2}
    secrets: [django_secret_key, db_password, redis_password, rabbitmq_password, metrics_token, readiness_token]
    volumes: ["media:/app/media"]
    networks: [backend, proxy]
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.schools.rule=Host(`${PLATFORM_DOMAIN}`) || HostRegexp(`[a-z0-9-]+\\.${TENANT_BASE_DOMAIN}`)
        - traefik.http.routers.schools.entrypoints=websecure
        - traefik.http.routers.schools.tls=true
        - traefik.http.routers.schools.tls.certresolver=le
        - traefik.http.routers.schools.tls.domains[0].main=${TENANT_BASE_DOMAIN}
        - traefik.http.routers.schools.tls.domains[0].sans=*.${TENANT_BASE_DOMAIN}
        - traefik.http.routers.schools.tls.domains[1].main=${PLATFORM_DOMAIN}
        - traefik.http.routers.schools.middlewares=security-headers@file
        - traefik.http.services.schools.loadbalancer.server.port=8000

  worker:
    image: ${SCHOOLS_IMAGE:?SCHOOLS_IMAGE deve conter uma imagem fixada por digest}
    command: ["opentelemetry-instrument", "celery", "-A", "core.celery", "worker", "--loglevel=info"]
    environment:
      <<: *app_environment
      OTEL_SERVICE_NAME: schools-worker
    secrets: [django_secret_key, db_password, redis_password, rabbitmq_password, metrics_token, readiness_token]
    volumes: ["media:/app/media"]
    networks: [backend]
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  beat:
    image: ${SCHOOLS_IMAGE:?SCHOOLS_IMAGE deve conter uma imagem fixada por digest}
    command: ["celery", "-A", "core.celery", "beat", "--loglevel=info"]
    environment:
      <<: *app_environment
      OTEL_SERVICE_NAME: schools-beat
    secrets: [django_secret_key, db_password, redis_password, rabbitmq_password, metrics_token, readiness_token]
    networks: [backend]
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  media-public:
    image: nginx:1.27-alpine
    configs:
      - source: media_nginx_config
        target: /etc/nginx/conf.d/default.conf
    volumes: ["media:/srv/media:ro"]
    networks: [proxy]
    deploy:
      replicas: 2
      labels:
        - traefik.enable=true
        - traefik.http.routers.schools-media.rule=(Host(`${PLATFORM_DOMAIN}`) || HostRegexp(`[a-z0-9-]+\\.${TENANT_BASE_DOMAIN}`)) && PathPrefix(`/media/`)
        - traefik.http.routers.schools-media.entrypoints=websecure
        - traefik.http.routers.schools-media.tls=true
        - traefik.http.routers.schools-media.tls.certresolver=le
        - traefik.http.routers.schools-media.priority=100
        - traefik.http.services.schools-media.loadbalancer.server.port=80

  traefik:
    image: traefik:v3.5.4@sha256:4df0a50fcf71b454c0d7ad17675776dc8d37359deae3291895bdaa008c1b9972
    environment:
      CF_DNS_API_TOKEN_FILE: /run/secrets/acme_dns_api_token
    secrets: [acme_dns_api_token]
    command:
      - --providers.swarm=true
      - --providers.swarm.exposedbydefault=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.dnschallenge=true
      - --certificatesresolvers.le.acme.dnschallenge.provider=${ACME_DNS_PROVIDER:-cloudflare}
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      - --log.format=json
      - --accesslog.format=json
      - --accesslog.fields.queryparameters.defaultmode=drop
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - acme:/acme
    networks: [proxy]
    deploy:
      placement:
        constraints: [node.role == manager]

  prometheus:
    image: prom/prometheus:v2.54.1@sha256:f6639335d34a77d9d9db382b92eeb7fc00934be8eae81dbc03b31cfe90411a94
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
      - source: prometheus_alerts
        target: /etc/prometheus/alerts.yml
    secrets: [metrics_token]
    volumes: ["prometheus_data:/prometheus"]
    networks: [backend]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0@sha256:af0f72b2d2493fc17f06cf3bc136548240cd7ebb2c8b1c8a7be6f3eb03068389
    configs:
      - source: otel_config
        target: /etc/otelcol-contrib/config.yml
    networks: [backend]

  grafana:
    image: grafana/grafana:11.2.0@sha256:408afb9726de5122b00a2576763a8a57a3c86d5b0eff5305bc994ceb3eb96c3f
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
    secrets: [grafana_admin_password]
    volumes: ["grafana_data:/var/lib/grafana"]
    networks: [backend]

configs:
  media_nginx_config:
    file: ./docker/nginx/media.conf
  prometheus_config:
    file: ./docker/prometheus/prometheus.yml
  prometheus_alerts:
    file: ./docker/prometheus/alerts.yml
  otel_config:
    file: ./docker/otel-collector.yml

secrets:
  django_secret_key: {external: true}
  db_password: {external: true}
  redis_password: {external: true}
  rabbitmq_password: {external: true}
  metrics_token: {external: true}
  readiness_token: {external: true}
  grafana_admin_password: {external: true}
  acme_dns_api_token: {external: true}

volumes:
  pgdata:
  redisdata:
  rabbitdata:
  acme:
  prometheus_data:
  grafana_data:
  media:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NFS_MEDIA_SERVER},rw,nfsvers=4
      device: :${NFS_MEDIA_PATH}

networks:
  backend:
    driver: overlay
    attachable: false
    driver_opts:
      encrypted: "true"
  proxy:
    driver: overlay
    attachable: false
