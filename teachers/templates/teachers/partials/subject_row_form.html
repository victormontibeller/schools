<tr id="subject-row-{{ subject.pk }}">
    <td colspan="4">
        <form hx-post="{% url 'subject_edit' subject.pk %}"
              hx-target="#subject-row-{{ subject.pk }}"
              hx-swap="outerHTML">
            {% csrf_token %}
            <div class="row g-2 align-items-end">
                {% for field in form %}
                <div class="col-12 col-md">
                    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="invalid-feedback d-block">{{ field.errors }}</div>{% endif %}
                </div>
                {% endfor %}
                <div class="col-12 col-md-auto d-flex gap-2">
                    <button type="button" class="btn btn-sm btn-outline-secondary"
                            hx-get="{% url 'subject_edit' subject.pk %}?cancel=1"
                            hx-target="#subject-row-{{ subject.pk }}" hx-swap="outerHTML">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-sm btn-primary">
                        <i class="feather-check me-1"></i> Salvar
                    </button>
                </div>
            </div>
        </form>
    </td>
</tr>
