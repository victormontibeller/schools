<div class="card mb-0" id="teacher-information-card">
    <form hx-post="{% url 'teacher_edit' teacher.pk %}"
          hx-target="#teacher-information-card"
          hx-swap="outerHTML">
        {% csrf_token %}
        <div class="card-header">
            <h6 class="card-title mb-0">Editar Informações do Professor</h6>
        </div>
        <div class="card-body">
            {% if form.non_field_errors %}
            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
            {% endif %}
            <div class="row g-3">
                {% for field in form %}
                    {% include "partials/form_field.html" with field=field full_width=True %}
                {% endfor %}
            </div>
        </div>
        <div class="card-footer d-flex justify-content-end gap-2">
            <button type="button"
                    class="btn btn-outline-secondary"
                    hx-get="{% url 'teacher_detail' teacher.pk %}?component=information"
                    hx-target="#teacher-information-card"
                    hx-swap="outerHTML">
                Cancelar
            </button>
            <button type="submit" class="btn btn-primary">
                <i class="feather-check me-1"></i> Salvar
            </button>
        </div>
    </form>
</div>
