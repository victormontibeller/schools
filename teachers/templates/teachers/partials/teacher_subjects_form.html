<div class="card mb-3 sm-profile-card" id="teacher-subjects-card">
    <form hx-post="{% url 'teacher_edit' teacher.pk %}?component=subjects"
          hx-target="#teacher-subjects-card"
          hx-swap="outerHTML">
        {% csrf_token %}
        <div class="card-header d-flex align-items-center justify-content-between gap-2">
            <h6 class="card-title mb-0">Disciplinas</h6>
            <div class="d-flex align-items-center gap-2">
                <button type="button"
                        class="btn btn-sm btn-outline-secondary"
                        hx-get="{% url 'teacher_detail' teacher.pk %}?component=subjects"
                        hx-target="#teacher-subjects-card"
                        hx-swap="outerHTML">
                    Cancelar
                </button>
                <button type="submit" class="btn btn-sm btn-primary">
                    <i class="feather-check me-1"></i> Salvar
                </button>
            </div>
        </div>
        <div class="card-body sm-selection-card-body sm-subjects-form-body">
            <div class="row g-3 sm-subjects-stack">
                {% for field in form %}
                    {% include "partials/form_field.html" with field=field full_width=True %}
                {% endfor %}
            </div>
        </div>
    </form>
</div>
