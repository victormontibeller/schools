{% for student in students %}
<form method="post" action="{% url 'guardian_student_link' guardian.pk student.pk %}" class="border rounded p-2 mb-2">
  {% csrf_token %}
  <div class="d-flex justify-content-between align-items-center gap-2">
    <div><strong>{{ student.get_full_name }}</strong><div class="text-muted small">{{ student.enrollment_number }}</div></div>
    <button type="submit" class="btn btn-sm btn-outline-primary">Vincular</button>
  </div>
  <div class="row g-2 mt-1">
    <div class="col-md-4"><select name="relationship_type" class="form-select form-select-sm" required><option value="MAE">Mãe</option><option value="PAI">Pai</option><option value="LEGAL">Responsável legal</option><option value="OUTRO">Outro</option></select></div>
    <div class="col-md-8 d-flex gap-3 align-items-center"><label><input type="checkbox" name="is_primary"> Principal</label><label><input type="checkbox" name="has_custody" checked> Guarda</label><label><input type="checkbox" name="can_pickup" checked> Pode buscar</label></div>
  </div>
</form>
{% empty %}{% if request.GET.q %}<p class="text-muted small">Nenhum aluno disponível.</p>{% endif %}{% endfor %}
