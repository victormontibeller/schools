# docker-compose.yml — ambiente de desenvolvimento completo.
# Inclui Traefik (proxy reverso + TLS), Prometheus, Grafana e Loki.
# Ver docs/02_ARCHITECTURE.md e docs/07_OBSERVABILITY.md.
services:
  postgres:
    image: postgres:15@sha256:bcab099bfaab33333a73a2ebe8c1d615c9f4c2402dd43452f989a36c6da9a5ba
    environment:
      POSTGRES_DB: schools_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [backend]

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [backend]

  rabbitmq:
    image: rabbitmq:3-management-alpine@sha256:606d8c0d6b3c18d1da9afc53bc7cdb2a8d5486df91b5a9830e9e07626c9ae281
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]
    labels:
      - "traefik.enable=false"

  app:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - ./media:/app/media
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      DJANGO_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [backend, proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=schools_proxy"
      - "traefik.http.routers.schools.rule=Host(`localhost`)"
      - "traefik.http.routers.schools.entrypoints=web"
      - "traefik.http.services.schools.loadbalancer.server.port=8000"

  worker:
    build: .
    command: celery -A core.celery worker --loglevel=info
    volumes:
      - .:/app
      - ./media:/app/media
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [backend]

  media-public:
    image: nginx:1.27-alpine
    volumes:
      - ./media:/srv/media:ro
      - ./docker/nginx/media.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=schools_proxy"
      - "traefik.http.routers.schools-media.rule=HostRegexp(`[a-z0-9.-]+`) && PathPrefix(`/media/`)"
      - "traefik.http.routers.schools-media.entrypoints=web"
      - "traefik.http.routers.schools-media.priority=100"
      - "traefik.http.services.schools-media.loadbalancer.server.port=80"

  beat:
    build: .
    command: celery -A core.celery beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [backend]

  # ── Reverse Proxy / TLS ────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.5.4@sha256:4df0a50fcf71b454c0d7ad17675776dc8d37359deae3291895bdaa008c1b9972
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Let's Encrypt automático em produção; acme.json vem do volume.
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:-admin@localhost}"
      - "--certificatesresolvers.le.acme.storage=/acme.json"
      - "--entrypoints.websecure.http.tls=true"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--log.format=json"
      - "--accesslog=true"
      - "--accesslog.format=json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - acme:/acme.json
    networks: [proxy]

  # ── Observabilidade: Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1@sha256:f6639335d34a77d9d9db382b92eeb7fc00934be8eae81dbc03b31cfe90411a94
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks: [backend]
    labels:
      - "traefik.enable=false"

  # ── Observabilidade: Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0@sha256:408afb9726de5122b00a2576763a8a57a3c86d5b0eff5305bc994ceb3eb96c3f
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks: [backend]
    labels:
      - "traefik.enable=false"

  # ── Observabilidade: Loki ──────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.2@sha256:ae0d78305c9c06512dfdee24b518eee82716269707c5e02ce62462c415a2f0c2
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks: [backend]
    labels:
      - "traefik.enable=false"

  # ── Coleta de logs: Promtail ──────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.1.2@sha256:47c3488971ca1e115df050835882399044fbd7c89f3970ae6f8ee8e713774302
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    networks: [backend]
    labels:
      - "traefik.enable=false"

volumes:
  pgdata:
  acme:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  backend:
  proxy:
