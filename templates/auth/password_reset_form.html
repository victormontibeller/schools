{% extends "base.html" %}
{% block content %}
<div class="container py-5" style="max-width: 480px;">
  <h2 class="mb-4">Recuperar senha</h2>
  <p class="text-muted">Informe seu e-mail para receber as instruções.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_div }}
    <button class="btn btn-primary" type="submit">Enviar</button>
  </form>
</div>
{% endblock %}
