{% extends "base.html" %}
{% block title %}Nova senha — School Manager{% endblock %}
{% block content %}
<div class="container py-5" style="max-width: 480px;">
  <h2 class="mb-4">Nova senha</h2>
  <p class="text-muted">Defina uma nova senha para sua conta.</p>
  <form method="post" novalidate>
    {% csrf_token %}
    <div class="row g-3">
      {% for field in form %}
        {% include "partials/form_field.html" with field=field full_width=True %}
      {% endfor %}
    </div>
    <button class="btn btn-primary mt-4" type="submit">Confirmar</button>
  </form>
</div>
{% endblock %}
