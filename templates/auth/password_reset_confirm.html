{% extends "base.html" %}
{% block content %}
<div class="container py-5" style="max-width: 480px;">
  <h2 class="mb-4">Nova senha</h2>
  <p class="text-muted">Defina uma nova senha para sua conta.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_div }}
    <button class="btn btn-primary" type="submit">Confirmar</button>
  </form>
</div>
{% endblock %}
