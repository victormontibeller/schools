{% if result.total_pages > 1 %}
<div class="d-flex justify-content-center py-3"><nav aria-label="Paginação"><ul class="pagination pagination-sm mb-0">
{% if result.has_previous %}<li class="page-item"><a class="page-link" hx-get="?page={{ result.page|add:'-1' }}{% if list_query %}&{{ list_query }}{% endif %}" hx-target="{{ pagination_target }}" hx-swap="innerHTML" aria-label="Página anterior">«</a></li>{% endif %}
<li class="page-item active"><span class="page-link">{{ result.page }} / {{ result.total_pages }}</span></li>
{% if result.has_next %}<li class="page-item"><a class="page-link" hx-get="?page={{ result.page|add:'1' }}{% if list_query %}&{{ list_query }}{% endif %}" hx-target="{{ pagination_target }}" hx-swap="innerHTML" aria-label="Próxima página">»</a></li>{% endif %}
</ul></nav></div>
{% endif %}
