{% extends "base.html" %}

{% block title %}Erro {{ status }} — School Manager{% endblock %}

{% block content %}
<div class="container py-5 text-center" style="max-width: 540px;">
    <div class="card border-0 shadow-sm">
        <div class="card-body py-5">
            <div class="display-1 text-muted mb-2">{{ status }}</div>
            <p class="lead fw-semibold">{{ message }}</p>
            <p class="text-muted small mt-3">
                <span class="badge bg-soft-secondary text-secondary">{{ code }}</span>
                ID: {{ correlation_id }}
            </p>
            <a href="{% url 'dashboard' %}" class="btn btn-primary mt-3">Voltar ao início</a>
        </div>
    </div>
</div>
{% endblock %}
