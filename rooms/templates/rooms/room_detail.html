{% extends "base.html" %}
{% block title %}{{ room.name }} — School Manager{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-left d-flex align-items-center">
        <div class="page-header-title"><h5 class="m-b-10">{{ room.name }}</h5></div>
        <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Home</a></li>
            <li class="breadcrumb-item"><a href="{% url 'rooms_list' %}">Salas</a></li>
            <li class="breadcrumb-item">{{ room.code }}</li>
        </ul>
    </div>
</div>

<div class="main-content">
    <div class="row g-3 align-items-start">
        <div class="col-12 col-xl-6">
            {% include "rooms/partials/room_information_card.html" %}
        </div>
    </div>
</div>
{% endblock %}
