{% for guardian in guardians %}<div class="d-flex justify-content-between align-items-center mt-2"><span>{{ guardian.full_name }} <small class="text-muted">{{ guardian.email|default:"" }}</small></span><button type="button" class="btn btn-sm btn-outline-primary" hx-get="{% url 'student_guardian_link' student.pk guardian.pk %}" hx-target="#student-guardians-card" hx-swap="outerHTML">Vincular</button></div>{% empty %}{% if query %}<p class="text-muted small mb-0 mt-2">Nenhum responsável encontrado.</p>{% endif %}{% endfor %}
