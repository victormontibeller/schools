server {
    listen 80;
    server_name _;

    location /media/ {
        alias /srv/media/public/;
        autoindex off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        return 404;
    }
}
