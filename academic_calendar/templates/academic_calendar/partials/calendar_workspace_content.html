<div class="row g-3 align-items-start">
    <div class="col-12 col-xl-8">
        <div class="card sm-detail-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div class="btn-group">
                    <a class="btn btn-outline-secondary btn-sm" hx-get="{% url 'calendar_month_specific' prev_year prev_month %}?selected_date={{ selected_date|date:'Y-m-d' }}" hx-target="#calendar-workspace" hx-swap="innerHTML" aria-label="Mês anterior"><i class="feather-chevron-left"></i></a>
                    <span class="btn btn-light btn-sm fw-semibold">{{ month_name }} {{ year }}</span>
                    <a class="btn btn-outline-secondary btn-sm" hx-get="{% url 'calendar_month_specific' next_year next_month %}?selected_date={{ selected_date|date:'Y-m-d' }}" hx-target="#calendar-workspace" hx-swap="innerHTML" aria-label="Próximo mês"><i class="feather-chevron-right"></i></a>
                </div>
                <a href="{% url 'calendar_month' %}" class="btn btn-link btn-sm">Hoje</a>
            </div>
            <div class="card-body p-2">{% include "academic_calendar/partials/calendar_grid.html" %}</div>
        </div>
    </div>
    <div class="col-12 col-xl-4">{% include "academic_calendar/partials/day_agenda.html" %}</div>
</div>
