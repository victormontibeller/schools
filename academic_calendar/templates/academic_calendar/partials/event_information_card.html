<div class="card sm-detail-card" id="calendar-day-agenda"><div class="card-header d-flex align-items-center justify-content-between gap-2"><h6 class="card-title mb-0">Evento</h6><div class="d-flex gap-2"><button type="button" class="btn btn-sm btn-outline-secondary" hx-get="{% url 'calendar_month_specific' selected_date.year selected_date.month %}?selected_date={{ selected_date|date:'Y-m-d' }}&component=agenda" hx-target="#calendar-day-agenda" hx-swap="outerHTML">Voltar</button><button type="button" class="btn btn-sm btn-outline-primary" hx-get="{% url 'event_edit' event.pk %}?selected_date={{ selected_date|date:'Y-m-d' }}" hx-target="#calendar-day-agenda" hx-swap="outerHTML"><i class="feather-edit-2 me-1"></i> Editar</button></div></div><div class="card-body"><h5 class="mb-3">{{ event.title }}</h5><dl class="row mb-0 sm-profile-definition"><dt class="col-sm-4 text-muted">Período</dt><dd class="col-sm-8">{{ event.start_date|date:"d/m/Y" }} – {{ event.end_date|date:"d/m/Y" }}</dd><dt class="col-sm-4 text-muted">Tipo</dt><dd class="col-sm-8">{{ event.get_type_display }}</dd><dt class="col-sm-4 text-muted">Público</dt><dd class="col-sm-8">{{ event.get_audience_display }}</dd><dt class="col-sm-4 text-muted">Descrição</dt><dd class="col-sm-8">{{ event.description|default:"—" }}</dd></dl></div></div>
