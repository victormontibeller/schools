<div class="card sm-detail-card" id="calendar-day-agenda"><form method="post" hx-post="{% if event %}{% url 'event_edit' event.pk %}?selected_date={{ selected_date|date:'Y-m-d' }}{% else %}{% url 'event_create' %}?date={{ selected_date|date:'Y-m-d' }}{% endif %}" hx-target="#calendar-day-agenda" hx-swap="outerHTML">{% csrf_token %}<div class="card-header d-flex align-items-center justify-content-between gap-2"><h6 class="card-title mb-0">{% if event %}Editar evento{% else %}Novo evento{% endif %}</h6><div class="d-flex gap-2"><button type="button" class="btn btn-sm btn-outline-secondary" hx-get="{% url 'calendar_month_specific' selected_date.year selected_date.month %}?selected_date={{ selected_date|date:'Y-m-d' }}&component=agenda" hx-target="#calendar-day-agenda" hx-swap="outerHTML">Cancelar</button><button type="submit" class="btn btn-sm btn-primary">Salvar</button></div></div><div class="card-body">{% if form.non_field_errors %}<div class="alert alert-danger py-2">{{ form.non_field_errors }}</div>{% endif %}<div class="row g-2">{% for field in form %}{% include "partials/form_field.html" with field=field %}{% endfor %}</div></div></form></div>
